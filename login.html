<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healio - Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e6f7f7, #f4f7f6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    width: 400px;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* Title */
.container h2 {
    color: #008080;
    margin-bottom: 25px;
}

/* Inputs */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
}

.input-box input:focus {
    border-color: #008080;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    background: #008080;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #006666;
}

/* Footer link */
.footer {
    margin-top: 15px;
    font-size: 14px;
}

.footer a {
    color: #008080;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login to Healio</h2>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Login</button>

    <div class="footer">
        Don't have an account? <a href="register.html">Create one</a>
    </div>
</div>

<script>
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const res = await fetch("http://localhost:4000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.role === "admin") {

            localStorage.setItem("role", "admin");

            window.location.href = "admin.html";

        } else {

            localStorage.setItem("role", "user");

            window.location.href = "index.html";
        }

    } catch (err) {

        alert("Server error");
        console.log(err);
    }
}
</script>

</body>
</html>
