<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healio - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #008080 0%, #2c3e50 100%); 
               height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
                      width: 100%; max-width: 380px; text-align: center; }
        
        .login-card h2 { color: #008080; margin-bottom: 10px; }
        .login-card p { color: #666; font-size: 14px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #008080; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #333; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        
        .login-btn { width: 100%; background: #008080; color: white; border: none; padding: 15px; 
                     border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #006666; transform: translateY(-2px); }

        .footer-text { margin-top: 20px; font-size: 13px; color: #666; }
        .footer-text a { color: #008080; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="assets/upload_area.png" width="60">
    <h2>Welcome to Healio</h2>
    <p>Please login to your account</p>

    <form id="loginForm">
        <div class="input-group">
            <label>Email Address</label>
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer-text">
        Don't have an account? <a href="create account.html">Sign Up</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // "Simulation" للـ Logic اللي سألتي عليه:
        if (email === 'admin@healio.com' && password === 'admin123') {
            alert('Welcome Admin!');
            window.location.href = 'admin.html'; // بيوديه لصفحة الإدارة
        } else {
            alert('Welcome Patient!');
            window.location.href = 'index.html'; // بيوديه لصفحة الحجز العادية
        }
    };
</script>

</body>
</html>
