<style>
    /* التعديلات الجديدة للمواعيد من غير ما نلمس الـ CSS الخارجي */
    .slot-day, .slot-time {
        border: 1px solid #e5e7eb;
        border-radius: 50px;
        padding: 10px 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        color: #4b5563;
        font-size: 14px;
        background: white;
    }

    .slot-day {
        min-width: 60px;
        padding: 15px 10px;
    }

    .slot-day span {
        font-size: 11px;
        font-weight: bold;
    }

    /* اللون التركواز لما نختار الموعد */
    .slot-day.active, .slot-time.active {
        background-color: #008080 !important;
        color: white !important;
        border-color: #008080 !important;
    }

    /* حركة خفيفة لما الماوس ييجي عليهم */
    .slot-day:hover, .slot-time:hover {
        border-color: #008080;
    }
</style>

<script>
    document.getElementById('open-google-maps').onclick = function() {
        // الإحداثيات دي الباك إند هيبعتها ديناميكياً لكل دكتور
        const lat = 30.0444; 
        const lng = 31.2357;
        
        // اللينك ده بيفتح الموقع بدقة
        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
        window.open(googleMapsUrl, '_blank');
    };
</script>

// كود اختيار المواعيد وتلوينها (شغال على الـ Internal CSS اللي فوق)
document.querySelectorAll('.slot-day, .slot-time').forEach(item => {
    item.addEventListener('click', function() {
        this.parentElement.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
        this.classList.add('active');
    });
});

function confirmBookingDetails() {
    const activeDay = document.querySelector('.slot-day.active');
    const selectedDay = activeDay.querySelector('span').innerText;
    const selectedDate = activeDay.innerText.replace(selectedDay, '').trim();
    const selectedTime = document.querySelector('.slot-time.active').innerText;
    
    localStorage.setItem('bookedDay', selectedDay + " " + selectedDate);
    localStorage.setItem('bookedTime', selectedTime);
    
    window.location.href = 'booking-appointment.html';
    
}
