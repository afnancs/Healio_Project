<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
</head>
<body style="background:#f8f9fa; font-family:sans-serif; margin:0;">
    <main style="text-align: center; padding: 50px; max-width: 650px; margin: 0 auto;">
        <h2 style="color: #008080;">Choose Payment Method</h2>
        <div style="background: white; border-radius: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); padding: 20px; margin: 25px 0; text-align:left;">
            <p><strong>Patient:</strong> <span id="patient-name"></span></p>
            <p><strong>Doctor:</strong> <span id="doctor-name"></span></p>
            <p><strong>Date:</strong> <span id="booking-day"></span></p>
            <p><strong>Time:</strong> <span id="booking-time"></span></p>
        </div>

        <div style="margin: 30px auto; max-width: 400px; display: flex; flex-direction: column; gap: 15px;">
            <div style="border: 1px solid #ddd; background:white; padding: 20px; border-radius: 10px; cursor: pointer;" onclick="paySuccess('Visa')">
                <img src="https://img.icons8.com/color/48/000000/visa.png" width="40" alt="Visa"> Pay with Visa
            </div>
            <div style="border: 1px solid #ddd; background:white; padding: 20px; border-radius: 10px; cursor: pointer;" onclick="paySuccess('PayPal')">
                <img src="https://img.icons8.com/color/48/000000/paypal.png" width="40" alt="PayPal"> Pay with PayPal
            </div>
        </div>
    </main>

    <script>
        function getPendingBooking() {
            try {
                return JSON.parse(localStorage.getItem('pendingBooking')) || {};
            } catch (e) {
                return {};
            }
        }

        window.onload = function () {
            const booking = getPendingBooking();
            document.getElementById('patient-name').innerText =
                booking.patientName || localStorage.getItem('patientName') || '';

            document.getElementById('doctor-name').innerText =
                booking.doctorName || localStorage.getItem('docName') || '';

            document.getElementById('booking-day').innerText =
                booking.date || localStorage.getItem('bookedDay') || '';

            document.getElementById('booking-time').innerText =
                booking.time || localStorage.getItem('bookedTime') || '';
        };

        async function paySuccess(method) {
            const booking = getPendingBooking();

            const bookingPayload = {
                patientName: booking.patientName || localStorage.getItem('patientName') || '',
                doctorName: booking.doctorName || localStorage.getItem('docName') || '',
                date: booking.date || localStorage.getItem('bookedDay') || '',
                time: booking.time || localStorage.getItem('bookedTime') || '',
                paymentMethod: method
            };

            const paymentPayload = {
                patientName: bookingPayload.patientName,
                doctorName: bookingPayload.doctorName,
                amount: 50,
                method: method,
                status: 'paid'
            };

            if (!bookingPayload.patientName || !bookingPayload.doctorName || !bookingPayload.date || !bookingPayload.time) {
                alert('Missing booking details. Please book again.');
                return;
            }

            try {
                const bookingResponse = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingPayload)
                });

                const bookingResult = await bookingResponse.json();
                if (!bookingResponse.ok) {
                    throw new Error(bookingResult.message || 'Booking failed');
                }

                const paymentResponse = await fetch('/api/payments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentPayload)
                });

                const paymentResult = await paymentResponse.json();
                if (!paymentResponse.ok) {
                    throw new Error(paymentResult.message || 'Payment failed');
                }

                localStorage.removeItem('pendingBooking');
                alert('Booking and payment saved successfully ✅');
                window.location.href = 'index.html';
            } catch (error) {
                alert(error.message || 'Something went wrong during payment');
            }
        }
    </script>
</body>
</html>
