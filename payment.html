<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - Healio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .payment-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .payment-card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px;
        }

        .payment-card h2 { color: #008080; margin-bottom: 25px; text-align: center; font-size: 24px; }

        /* تنسيق اختيار طريقة الدفع */
        .method-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .method-option { 
            flex: 1; border: 2px solid #eee; padding: 10px; border-radius: 10px; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .method-option img { width: 40px; display: block; margin: 0 auto 5px; }
        .method-option.active { border-color: #008080; background-color: #f0fdfd; }

        /* تنسيق إدخال المبلغ */
        .amount-entry { margin-bottom: 20px; text-align: left; }
        .amount-entry label { display: block; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 8px; }
        .amount-input-wrapper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        #user-amount { flex-grow: 1; border: none; padding: 12px; font-size: 16px; outline: none; }
        .currency-tag { background: #f8faff; padding: 12px 15px; border-left: 1px solid #ddd; color: #008080; font-weight: bold; }

        /* تنسيق خانات الكارت */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: #008080; }
        .flex-inputs { display: flex; gap: 15px; }

        .pay-btn { 
            width: 100%; background: #28a745; color: white; border: none; 
            padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .pay-btn:hover { background: #218838; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="payment-card">
        <h2><i class="fas fa-lock"></i> Secure Payment</h2>

        <label style="font-size: 14px; font-weight: 600; color: #444;">Choose Payment Method:</label>
        <div class="method-selector">
            <div class="method-option active" onclick="selectMethod(this, 'Visa')">
                <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa">
                <span>Visa</span>
            </div>
            <div class="method-option" onclick="selectMethod(this, 'PayPal')">
                <img src="https://img.icons8.com/color/48/000000/paypal.png" alt="PayPal">
                <span>PayPal</span>
            </div>
        </div>

        <div class="amount-entry">
            <label for="user-amount">Amount to Pay (EGP):</label>
            <div class="amount-input-wrapper">
                <input type="number" id="user-amount" placeholder="Enter amount" min="1">
                <span class="currency-tag">EGP</span>
            </div>
        </div>

        <form id="payment-form" onsubmit="handlePayment(event)">
            <div class="input-group">
                <label>Cardholder Name</label>
                <input type="text" placeholder="Afnan Ahmed" required>
            </div>
            
            <div class="input-group">
                <label>Card Number</label>
                <input type="text" placeholder="xxxx xxxx xxxx xxxx" maxlength="16" required>
            </div>
            
            <div class="flex-inputs">
                <div class="input-group">
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="input-group">
                    <label>CVV</label>
                    <input type="password" placeholder="***" maxlength="3" required>
                </div>
            </div>
            
            <button type="submit" class="pay-btn">Confirm & Pay</button>
        </form>
    </div>
</div>

<script>
    let selectedPaymentMethod = 'Visa';

    // وظيفة لاختيار طريقة الدفع بصرياً فقط
    function selectMethod(element, method) {
        // حذف الـ active من الجميع
        document.querySelectorAll('.method-option').forEach(opt => opt.classList.remove('active'));
        // إضافة active للخيار المختار
        element.classList.add('active');
        selectedPaymentMethod = method;
    }

    // وظيفة الدفع عند ضغط الزرار الأخير
    function handlePayment(event) {
        event.preventDefault(); // يمنع الصفحة من التحميل

        const amount = document.getElementById('user-amount').value;
        const docName = localStorage.getItem('docName') || "the doctor";

        if (!amount || amount <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        // التنبيه النهائي بالنجاح
        alert(`Payment successful via ${selectedPaymentMethod}!\nAmount: ${amount} EGP\nYour appointment with ${docName} is confirmed.`);
        
        // التوجيه للهوم بعد النجاح
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
