<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* التنسيق الأساسي للجسم */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* المربع الأبيض الرئيسي */
        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .login-container h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 24px;
        }

        .login-container p {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* تنسيق مجموعات الإدخال */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #4b4b4b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; /* بيضمن إن العرض يفضل 100% */
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #5fcf80;
            outline: none;
        }

        /* الزرار الأخضر */
        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #20b2aa;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background-color: #20b2aa;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #65676b;
        }

        .footer-text a {
            color: #20b2aa;
            text-decoration: none;
            font-weight: bold;
        }

        .location-container {
    width: 100%;
    margin-bottom: 20px;
    text-align: left;
}

.location-label {
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
    color: #333;
}

.location-flex-row {
    display: flex;
    gap: 8px;
    width: 100%;
}

#location-input {
    flex: 1; /* يخلي المربع ياخد المساحة المتاحة */
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #f9f9f9;
}

#location-btn {
    padding: 10px 15px;
    background-color: #20b2aa;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap; }
#location-btn:hover {
    background-color: #15817c;
}


    </style>
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>
        <p>Please sign up to book appointment</p>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Full Name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="Email Address">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" placeholder="Password">
        </div>

        <div class="form-group password-field"> 
    </div>

<div class="location-container">
    <label class="location-label">Your Location (to find nearest doctors)</label>
    <div class="location-flex-row">
        <input type="text" id="location-input" placeholder="0.0000, 0.0000" readonly>
        <button type="button" onclick="getUserLocation()" id="location-btn">
            <i class="fas fa-map-marker-alt"></i> Get My Location
        </button>
    </div>
</div>
        <button type="button" class="signup-btn" onclick="saveAccount()">Create Account</button>
        
        <div class="footer-text">

            Already have an account? <a href="#">Login here</a>
        </div>
    </div>

    <script>
        async function saveAccount() {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPass').value.trim();

            if (!name || !email || !password) {
                alert("Please fill in your details");
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName: name, email, password })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || 'Unable to create account');
                }

                localStorage.setItem('storedName', name);
                localStorage.setItem('storedEmail', email);
                alert(result.message);
                window.location.href = 'index.html';
            } catch (error) {
                alert(error.message || 'Something went wrong');
            }
        }
    </script>

</body>
</html>
