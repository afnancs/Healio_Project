<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* التنسيق الأساسي للجسم */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* المربع الأبيض الرئيسي */
        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .login-container h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 24px;
        }

        .login-container p {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* تنسيق مجموعات الإدخال */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #4b4b4b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; /* بيضمن إن العرض يفضل 100% */
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #5fcf80;
            outline: none;
        }

        /* الزرار الأخضر */
        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #20b2aa;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background-color: #20b2aa;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #65676b;
        }

        .footer-text a {
            color: #20b2aa;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>
        <p>Please sign up to book appointment</p>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Full Name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="Email Address">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" placeholder="Password">
        </div>

        <button type="button" class="signup-btn" onclick="saveAccount()">Create Account</button>
        
        <div class="footer-text">
            Already have an account? <a href="#">Login here</a>
        </div>
    </div>

    <script>
        function saveAccount() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            if (name && email) {
                localStorage.setItem('storedName', name);
                alert("Account Created: " + name);
                window.location.href = "index.html"; 
            } else {
                alert("Please fill in your details");
            }
        }
    </script>

</body>
</html>
