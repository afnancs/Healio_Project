<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* التنسيق الأساسي للجسم */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* المربع الأبيض الرئيسي */
        .login-container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .login-container h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 24px;
        }

        .login-container p {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* تنسيق مجموعات الإدخال */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #4b4b4b;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; /* بيضمن إن العرض يفضل 100% */
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #5fcf80;
            outline: none;
        }

        /* الزرار الأخضر */
        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #20b2aa;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background-color: #20b2aa;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #65676b;
        }

        .footer-text a {
            color: #20b2aa;
            text-decoration: none;
            font-weight: bold;
        }

        .location-container {
    width: 100%;
    margin-bottom: 20px;
    text-align: left;
}

.location-label {
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
    color: #333;
}

.location-flex-row {
    display: flex;
    gap: 8px;
    width: 100%;
}

#location-input {
    flex: 1; /* يخلي المربع ياخد المساحة المتاحة */
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #f9f9f9;
}

#location-btn {
    padding: 10px 15px;
    background-color: #20b2aa;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap; }
#location-btn:hover {
    background-color: #15817c;
}


    </style>
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>
        <p>Please sign up to book appointment</p>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Full Name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="Email Address">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" placeholder="Password">
        </div>

        <div class="form-group password-field"> 
    </div>
     
    <div class="input-group">
    <label><i class="fas fa-map-marker-alt"></i> Your Location</label>
    <div style="position: relative;">
        <input type="text" id="location-input" placeholder="Start typing (e.g. Maadi, Cairo...)" oninput="searchLocation(this.value)" autocomplete="off" required>
        
        <div id="location-results" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto;">
        </div>
    </div>
    <small id="status" style="color: #666; font-size: 11px; margin-top: 5px; display: block;">* Select your area from the list for accuracy.</small>
</div>

<style>
    /* تنسيق الاقتراحات */
    .result-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 14px; text-align: left; transition: 0.2s; }
    .result-item:hover { background-color: #e6f2f2; color: #008080; }
    #location-input:focus { border-color: #008080; box-shadow: 0 0 5px rgba(0,128,128,0.2); }
</style>

<script>
let searchTimeout;

async function searchLocation(query) {
    const resultsDiv = document.getElementById('location-results');
    
    // لو المسح أقل من 3 حروف ميعملش حاجة
    if (query.length < 3) {
        resultsDiv.style.display = 'none';
        return;
    }

    // "Debouncing" عشان ميبعتش طلبات كتير للسيرفر ويهنج
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(async () => {
        try {
            // بنستخدم سيرفر مجاني بيجيب أماكن دقيقة جداً
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&addressdetails=1&limit=5`);
            const data = await response.json();

            if (data.length > 0) {
                resultsDiv.innerHTML = '';
                data.forEach(place => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerText = place.display_name;
                    div.onclick = () => selectLocation(place.display_name);
                    resultsDiv.appendChild(div);
                });
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.style.display = 'none';
            }
        } catch (error) {
            console.error("Error fetching locations:", error);
        }
    }, 500); // بينتظر نص ثانية بعد ما توقفي كتابة
}

function selectLocation(address) {
    const locationInput = document.getElementById('location-input');
    const resultsDiv = document.getElementById('location-results');
    
    locationInput.value = address; // حط العنوان اللي اختاره في المربع
    resultsDiv.style.display = 'none'; // اخفي القائمة
}

// قفل القائمة لو اليوزر داس في أي حتة تانية
document.addEventListener('click', function(e) {
    if (e.target.id !== 'location-input') {
        document.getElementById('location-results').style.display = 'none';
    }
});
</script>
 
        <button type="button" class="signup-btn" onclick="saveAccount()">Create Account</button>
        
        <div class="footer-text">

            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        function saveAccount() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;

            if (name && email) {
                localStorage.setItem('storedName', name);
                alert("Account Created: " + name);
                window.location.href = "index.html"; 
            } else {
                alert("Please fill in your details");
            }
        }
    </script>

</body>
</html>>
