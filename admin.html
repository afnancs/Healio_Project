<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Healio - Admin Dashboard</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>

        :root{
            --primary:#008080;
            --secondary:#2c3e50;
            --bg:#f4f7f6;
            --success:#28a745;
            --danger:#dc3545;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            display:flex;
        }

        /* Sidebar */

        .sidebar{
            width:250px;
            height:100vh;
            background:var(--secondary);
            color:white;
            position:fixed;
            padding:20px;
        }

        .sidebar h2{
            text-align:center;
            color:#00d1d1;
            margin-bottom:30px;
        }

        .sidebar-link{
            display:block;
            text-decoration:none;
            color:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;
            transition:.3s;
        }

        .sidebar-link:hover,
        .sidebar-link.active{
            background:var(--primary);
        }

        .sidebar-link i{
            margin-right:10px;
        }

        /* Main */

        .main-content{
            margin-left:250px;
            width:100%;
            padding:30px;
        }

        /* Stats */

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .stat-card{
            background:white;
            border-radius:12px;
            padding:20px;
            text-align:center;
            box-shadow:0 4px 6px rgba(0,0,0,.05);
        }

        .stat-card i{
            font-size:30px;
            color:var(--primary);
            margin-bottom:10px;
        }

        .stat-card h3{
            margin:5px 0;
            color:#666;
            font-size:16px;
        }

        .stat-card p{
            margin:0;
            font-size:28px;
            font-weight:bold;
            color:var(--secondary);
        }

        /* Table */

        .table-container{
            background:white;
            border-radius:12px;
            padding:20px;
            box-shadow:0 4px 6px rgba(0,0,0,.05);
            overflow-x:auto;
        }

        .table-container h2{
            margin-top:0;
            color:var(--secondary);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        th,td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid #eee;
        }

        th{
            background:#f8f9fa;
            color:var(--secondary);
        }

        .status{
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
            font-weight:bold;
            text-transform:capitalize;
        }

        .status.pending{
            background:#fff3cd;
            color:#856404;
        }

        .status.confirmed{
            background:#d4edda;
            color:#155724;
        }

        .status.cancelled{
            background:#f8d7da;
            color:#721c24;
        }

        .btn{
            border:none;
            padding:8px 12px;
            border-radius:6px;
            color:white;
            cursor:pointer;
            transition:.3s;
            font-size:13px;
        }

        .btn:hover{
            transform:scale(1.05);
            opacity:.9;
        }

        .btn-approve{
            background:var(--success);
            margin-right:5px;
        }

        .btn-cancel{
            background:var(--danger);
        }

    </style>
</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Healio Admin</h2>

        <a href="#" class="sidebar-link active">
            <i class="fas fa-home"></i>
            Dashboard
        </a>

        <a href="#" class="sidebar-link">
            <i class="fas fa-user-md"></i>
            Doctors
        </a>

        <a href="#" class="sidebar-link">
            <i class="fas fa-calendar-alt"></i>
            Appointments
        </a>

        <a href="#" class="sidebar-link">
            <i class="fas fa-users"></i>
            Patients
        </a>

        <a href="index.html"
            class="sidebar-link"
            style="margin-top:50px;color:#ff7675;">

            <i class="fas fa-sign-out-alt"></i>
            Logout
        </a>

    </div>

    <!-- Main -->

    <div class="main-content">

        <!-- Stats -->

        <div class="stats-grid">

            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <h3>Total Bookings</h3>
                <p id="bookings-count">0</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-user-md"></i>
                <h3>Active Doctors</h3>
                <p id="doctors-count">0</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-money-bill-wave"></i>
                <h3>Total Revenue</h3>
                <p id="revenue-count">0 EGP</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <h3>Pending</h3>
                <p id="pending-count">0</p>
            </div>

        </div>

        <!-- Table -->

        <div class="table-container">

            <h2>Recent Appointment Requests</h2>

            <table>

                <thead>
                    <tr>
                        <th>Patient Name</th>
                        <th>Doctor Name</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="admin-table-body"></tbody>

            </table>

        </div>

    </div>

    <script>

    // =========================
    // Admin Protection
    // =========================

    const role = localStorage.getItem("role");

    if(role !== "admin"){

        alert("Access denied");

        window.location.href = "index.html";
    }

    // =========================
    // Load Dashboard Data
    // =========================

    async function loadAppointments() {

        try {

            // ===== Fetch Data Parallel =====

            const [appointmentsRes, paymentsRes] = await Promise.all([

                fetch("http://localhost:4000/api/admin/appointments"),

                fetch("http://localhost:4000/api/payments")

            ]);

            const appointments = await appointmentsRes.json();

            const payments = await paymentsRes.json();

            const tbody =
                document.getElementById("admin-table-body");

            // =========================
            // Stats Variables
            // =========================

            let pendingCount = 0;

            let doctorsSet = new Set();

            let totalRevenue = 0;

            let activeBookings = 0;

            // =========================
            // Revenue
            // =========================

            payments.forEach((p) => {

                // احسب الإيرادات من المدفوعات المؤكدة فقط

                if(
                    p.status === "confirmed" ||
                    p.status === "paid" ||
                    p.status === "success"
                ){

                    totalRevenue += Number(

                        p.amount ||
                        p.price ||
                        p.payment ||
                        0
                    );
                }
            });

            // =========================
            // Build Table
            // =========================

            let rows = "";

            appointments.forEach((b) => {

                const status =
                    (b.status || "pending").toLowerCase();

                // ===== Pending =====

                if(status === "pending"){

                    pendingCount++;
                }

                // ===== Active Bookings =====

                if(status !== "cancelled"){

                    activeBookings++;
                }

                // ===== Active Doctors =====

                if(

                    b.doctorName &&
                    status !== "cancelled"

                ){

                    doctorsSet.add(b.doctorName);
                }

                // ===== Buttons =====

                let actionButtons = "";

                // لو pending فقط يظهر confirm

                if(status === "pending"){

                    actionButtons += `

                        <button
                            class="btn btn-approve"
                            onclick="confirmBooking('${b._id}')">

                            Confirm

                        </button>
                    `;
                }

                // لو مش cancelled يظهر cancel

                if(status !== "cancelled"){

                    actionButtons += `

                        <button
                            class="btn btn-cancel"
                            onclick="cancelBooking('${b._id}')">

                            Cancel

                        </button>
                    `;
                }

                // ===== Table Row =====

                rows += `

                    <tr>

                        <td>
                            ${b.patientName || "N/A"}
                        </td>

                        <td>
                            ${b.doctorName || "N/A"}
                        </td>

                        <td>
                            ${b.date || ""}
                            -
                            ${b.time || ""}
                        </td>

                        <td>

                            <span class="status ${status}">

                                ${status}

                            </span>

                        </td>

                        <td>

                            ${actionButtons}

                        </td>

                    </tr>
                `;
            });

            // =========================
            // Render Table
            // =========================

            tbody.innerHTML = rows;

            // =========================
            // Update Cards
            // =========================

            document.getElementById(
                "bookings-count"
            ).innerText = activeBookings;

            document.getElementById(
                "doctors-count"
            ).innerText = doctorsSet.size;

            document.getElementById(
                "pending-count"
            ).innerText = pendingCount;

            document.getElementById(
                "revenue-count"
            ).innerText = totalRevenue + " EGP";

        }

        catch(err){

            console.log(err);

            alert("Failed to load dashboard data");
        }
    }

    // =========================
    // Confirm Booking
    // =========================

    async function confirmBooking(id){

        try{

            const res = await fetch(

                `http://localhost:4000/api/admin/appointments/${id}/confirm`,

                {
                    method:"PUT"
                }
            );

            if(!res.ok){

                throw new Error("Confirm failed");
            }

            // Reload instantly

            await loadAppointments();

        }

        catch(err){

            console.log(err);

            alert("Failed to confirm booking");
        }
    }

    // =========================
    // Cancel Booking
    // =========================

    async function cancelBooking(id){

        try{

            const res = await fetch(

                `http://localhost:4000/api/admin/appointments/${id}/cancel`,

                {
                    method:"PUT"
                }
            );

            if(!res.ok){

                throw new Error("Cancel failed");
            }

            // Reload instantly

            await loadAppointments();

        }

        catch(err){

            console.log(err);

            alert("Failed to cancel booking");
        }
    }

    // =========================
    // First Load
    // =========================

    loadAppointments();

    // =========================
    // Auto Refresh
    // =========================

    setInterval(() => {

        loadAppointments();

    }, 10000);

</script>

</body>
</html>
